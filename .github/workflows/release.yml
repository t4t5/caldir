name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-cli-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if caldir-cli version tag exists
        id: check
        run: |
          version=$(grep '^version' caldir-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists, skipping CLI release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${tag} does not exist, will release CLI"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-cli-version
    if: needs.check-cli-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          staging="caldir-${{ matrix.target }}"
          mkdir "$staging"
          for bin in caldir caldir-provider-google caldir-provider-icloud caldir-provider-caldav caldir-provider-outlook caldir-provider-webcal; do
            cp "target/${{ matrix.target }}/release/${bin}" "$staging/"
          done
          tar -czf "${staging}.tar.gz" -C "$staging" .
          echo "TARBALL=${staging}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: caldir-${{ matrix.target }}
          path: ${{ env.TARBALL }}

  release:
    needs: [check-cli-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="v${{ needs.check-cli-version.outputs.version }}"
          gh release create "$version" artifacts/*.tar.gz \
            --title "$version" \
            --generate-notes

  publish:
    needs: release
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish changed crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          crate_version() {
            grep '^version' "$1/Cargo.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/'
          }

          # Returns 0 if {crate}@{version} is already on crates.io, 1 otherwise.
          already_published() {
            local crate=$1 version=$2 status
            status=$(curl -sS -o /dev/null -w "%{http_code}" \
              "https://crates.io/api/v1/crates/${crate}/${version}")
            [ "$status" = "200" ]
          }

          # Returns 0 if a publish happened, 1 if skipped.
          publish_if_new() {
            local crate=$1 version
            version=$(crate_version "$crate")
            if already_published "$crate" "$version"; then
              echo "${crate} ${version}: already on crates.io, skipping"
              return 1
            fi
            echo "${crate} ${version}: publishing..."
            cargo publish -p "$crate"
            return 0
          }

          # Publish caldir-core first; if it published, wait for the index to
          # catch up before publishing dependents.
          if publish_if_new caldir-core; then
            echo "Waiting 30s for crates.io to index caldir-core..."
            sleep 30
          fi

          publish_if_new caldir-cli || true
          publish_if_new caldir-provider-google || true
          publish_if_new caldir-provider-caldav || true
          publish_if_new caldir-provider-outlook || true
          publish_if_new caldir-provider-webcal || true
          publish_if_new caldir-provider-icloud || true
